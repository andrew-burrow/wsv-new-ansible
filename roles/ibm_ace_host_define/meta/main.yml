---

galaxy_info:
  author: Andrew Burrow
  description: >-
    Define host parameters for IBM App Connect Enterprise

    This *define role* describes the parameters controlling the installation
    and maintenance of ACE for a host.

    The separation between host and environment components of the ACE
    installation is complicated by the multi-environment hosting.  If the two
    concerns are not carefully separated then there can be accidental clashes
    in the host settings from different environments running on the same host.

    In inventory deployments,

    -   DO define these in host vars or host group_vars, e.g.,
        `host_vars/hostname.yml` or `group_vars/ace_hosts.yml`
    -   DO NOT define these in environment group_vars, e.g, `ts1_ace.yml`

    See `../defaults/main.yml` for details on the parameters.
  company: Syntegrity Solutions

dependencies: []
