#
# :Precis: Define environment parameters for IBM App Connect Enterprise
# :Authors: Andrew Burrow
# :Contact: andrew.burrow@syntegrity.com.au
#

---

# Base directory
#
# What is the filename prefix for IBM ACE software installation directories?
ibm_ace_environment_base_dir: /opt/ibm

# Environment identifier
#
# What is the short name for this environment?  This is used in directory
# paths and integration node names.  Examples: sx1, ts1, ts2, prod
ibm_ace_environment: sx1

# ACE version and package
#
# What version of IBM App Connect Enterprise are we installing?  What is
# the filename of the installation package?  Where is it located?
ibm_ace_environment_version: "13.0.6.2"
ibm_ace_environment_package: "13.0-ACE-LINUXX64-13.0.6.2.tar.gz"
ibm_ace_environment_source_dir: /var/tmp

# Work path for integration nodes
#
# Where should integration node working directories be created?  This path
# is passed to mqsicreatebroker with -w flag.
ibm_ace_environment_work_path: "/var/mqsi/{{ ibm_ace_environment }}"

# Integration nodes to create
#
# List of integration nodes to create in this environment.  Each entry
# specifies the node name, associated queue manager, and HTTP port.
ibm_ace_environment_integration_nodes:
  - name: ACESX1J0201
    queue_manager: ASX1J0201
    port: 4543
  - name: ACESX1I0201
    queue_manager: ASX1I0201
    port: 4443

# SSL certificate configuration
#
# What is the filename of the P12 certificate file?  What is its password?
# The certificate file should be in the source directory.
ibm_ace_environment_cert_p12: test-cert.p12
ibm_ace_environment_cert_password: ""
