#
# :Precis: Define host parameters for IBM MQ
# :Authors: Andrew Burrow
# :Contact: andrew.burrow@syntegrity.com.au
#

---

# Daemon user and groups
#
# What is the name and UID of the account to run the daemon?  What is
# the name and GID of the primary group of the daemon?  Which
# administrative users should be added to the primary group of the
# daemon?
ibm_mq_host_user: mqm
ibm_mq_host_uid: 5000
ibm_mq_host_group: mqm
ibm_mq_host_gid: 5000
ibm_mq_host_users: []

# System resource limits for mqm user
#
# What are the soft and hard limits for open files (nofile) and processes
# (nproc) for the mqm user?  These go in /etc/security/limits.conf.
ibm_mq_host_nofile: 10240
ibm_mq_host_nproc: 4096

# Brokers group
#
# What is the name of the group for integration brokers? This group
# provides shared access between MQ and ACE components.
ibm_mq_host_brokers_group: mqbrkrs

# Brokers group GID
#
# What is the GID for the mqbrkrs secondary group?  If not specified, the
# system will auto-assign.
ibm_mq_host_brokers_gid: 5002
