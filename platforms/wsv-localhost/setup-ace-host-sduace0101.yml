#
# :Precis: Setup localhost for IBM ACE environments
# :Authors: Andrew Burrow
# :Contact: andrew.burrow@syntegrity.com.au
#

---

- name: Setup host for IBM ACE
  hosts: localhost
  become: true
  gather_facts: true

  vars:
    # FROM ibm_ace_host_define
    #

    # Daemon user and groups
    #
    # What is the name and UID of the account to run ACE?  What is the name
    # and GID of the primary group?  Which additional groups should the user
    # belong to?  Which administrative users should be added to the primary
    # group?
    ibm_ace_host_user: aceadmin
    ibm_ace_host_uid: 10778
    ibm_ace_host_group: mqbrkrs
    ibm_ace_host_gid: 10778
    ibm_ace_host_additional_groups:
      - mqm
    ibm_ace_host_users: []

  roles:
    - ibm_ace_host_define
    - ibm_ace_host_config
